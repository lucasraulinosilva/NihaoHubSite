<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>

<style>
    .navbar {
            background-color: #304D6D; /* Cor da navbar */
        }

        .navbar a {
            color: white !important; /* Cor do texto da navbar */
        }
</style>

<body>
    <nav class="navbar nav nav-underline justify-content-center p-3">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="cadastro.html">Cadastro</a>
        <a class="nav-link" href="login.html">Login</a>
    </nav>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 col-sm-10">
                <article class="card shadow-sm p-4">
                    <h2 class="text-center mb-4">Cadastro</h2>
                    <form>
                        <!-- Parte 1: Informações básicas -->
                        <section>
                            <h4 class="mb-3">Informações Básicas</h4>
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="Digite seu email" required>
                            </div>
                            <div class="mb-3">
                                <label for="confirmarEmail" class="form-label">Confirmar Email</label>
                                <input type="email" class="form-control" id="confirmarEmail" placeholder="Confirme seu email" required>
                            </div>
                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
                            </div>
                            <div class="mb-3">
                                <label for="confirmarSenha" class="form-label">Confirmar Senha</label>
                                <input type="password" class="form-control" id="confirmarSenha" placeholder="Confirme sua senha" required>
                            </div>
                        </section>

                        <!-- Parte 2: Dados cadastrais -->
                        <section>
                            <h4 class="mb-3 mt-5">Dados Cadastrais</h4>
                            <div class="mb-3">
                                <label for="telefone" class="form-label">Telefone para Contato</label>
                                <input type="tel" class="form-control" id="telefone" placeholder="Digite seu telefone" required>
                            </div>
                            <div class="mb-3">
                                <label for="cidade" class="form-label">Cidade</label>
                                <input type="text" class="form-control" id="cidade" placeholder="Digite sua cidade" required>
                            </div>
                            <div class="mb-3">
                                <label for="estado" class="form-label">Estado</label>
                                <select class="form-select" id="estado" required>
                                    <option value="">Selecione</option>
                                    <option value="AC">Acre</option>
                                    <option value="AL">Alagoas</option>
                                    <option value="AP">Amapá</option>
                                    <option value="AM">Amazonas</option>
                                    <option value="BA">Bahia</option>
                                    <option value="CE">Ceará</option>
                                    <option value="DF">Distrito Federal</option>
                                    <option value="ES">Espírito Santo</option>
                                    <option value="GO">Goiás</option>
                                    <option value="MA">Maranhão</option>
                                    <option value="MT">Mato Grosso</option>
                                    <option value="MS">Mato Grosso do Sul</option>
                                    <option value="MG">Minas Gerais</option>
                                    <option value="PA">Pará</option>
                                    <option value="PB">Paraíba</option>
                                    <option value="PR">Paraná</option>
                                    <option value="PE">Pernambuco</option>
                                    <option value="PI">Piauí</option>
                                    <option value="RJ">Rio de Janeiro</option>
                                    <option value="RN">Rio Grande do Norte</option>
                                    <option value="RS">Rio Grande do Sul</option>
                                    <option value="RO">Rondônia</option>
                                    <option value="RR">Roraima</option>
                                    <option value="SC">Santa Catarina</option>
                                    <option value="SP">São Paulo</option>
                                    <option value="SE">Sergipe</option>
                                    <option value="TO">Tocantins</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="sexo" class="form-label">Sexo</label>
                                <select class="form-select" id="sexo" required>
                                    <option value="">Selecione</option>
                                    <option value="Masculino">Masculino</option>
                                    <option value="Feminino">Feminino</option>
                                    <option value="PrefiroNaoDizer">Prefiro não dizer</option>
                                    <option value="Outro">Outro</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="escolaridade" class="form-label">Escolaridade</label>
                                <select class="form-select" id="escolaridade" required>
                                    <option value="">Selecione</option>
                                    <option value="fundamental">Ensino fundamental</option>
                                    <option value="fundamental_incompleto">Ensino fundamental incompleto</option>
                                    <option value="medio_completo">Ensino médio completo</option>
                                    <option value="medio_incompleto">Ensino médio incompleto</option>
                                    <option value="superior_completo">Ensino superior completo</option>
                                    <option value="superior_incompleto">Ensino superior incompleto</option>
                                    <option value="mestrado">Mestrado</option>
                                    <option value="doutorado">Doutorado</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="areaAtuacao" class="form-label">Área de Atuação</label>
                                <input type="text" class="form-control" id="areaAtuacao" placeholder="Digite sua área de atuação" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Você é?</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="tipoCadastro" id="professor" value="professor" required>
                                    <label class="form-check-label" for="professor">Professor</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="tipoCadastro" id="estudante" value="estudante" required>
                                    <label class="form-check-label" for="estudante">Estudante</label>
                                </div>
                            </div>

                            <div class="mb-3 d-none" id="formacaoCampo">
                                <label for="formacao" class="form-label">Formação</label>
                                <select class="form-select" id="formacao">
                                    <option value="">Selecione</option>
                                    <option value="Administracao">Administração</option>
                                    <option value="Agronomia">Agronomia</option>
                                    <option value="Analise_desenv_sistemas">Análise e Desenvolvimento de Sistemas</option>
                                    <option value="Antropologia">Antropologia</option>
                                    <option value="Arquitetura_urbanismo">Arquitetura e Urbanismo</option>
                                    <option value="Biomedicina">Biomedicina</option>
                                    <option value="Ciencias_contabeis">Ciências Contábeis</option>
                                    <option value="Ciencias_da_computacao">Ciências da Computação</option>
                                    <option value="Ciencias_da_saude">Ciências da Saúde</option>
                                    <option value="Direito">Direito</option>
                                    <option value="Educação">Educação</option>
                                    <option value="Enfermagem">Enfermagem</option>
                                    <option value="Engenharia_civil">Engenharia Civil</option>
                                    <option value="Engenharia_de_producao">Engenharia de Produção</option>
                                    <option value="Engenharia_da_computacao">Engenharia da Computação</option>
                                    <option value="Farmacia">Farmácia</option>
                                    <option value="Psicologia">Psicologia</option>
                                    <option value="Quimica">Química</option>
                                </select>
                            </div>
                        </section>

                        <!-- Parte 3: Termos de Consentimento -->
                        <section>
                            <h4 class="mb-3 mt-5">Termos de Consentimento</h4>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="concordar" required>
                                <label class="form-check-label" for="concordar">Eu concordo com as <a href="politicas_privacidade.html" target="_blank">políticas de privacidade</a> do site.</label>
                                <input type="checkbox" class="form-check-input" id="concordar" required>
                                <label class="form-check-label" for="concordar">Eu li e aceito os <a href="termos_de_uso.html" target="_blank">termos de uso</a> do site.</label>
                                
    
                            </div>
                        </section>

                        <!-- Botão de Enviar -->
                        <div class="mb-3">
                            <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                        </div>
                    </form>
                </article>
            </div>
        </div>
    </main>

    <footer class="text-center mt-5">
        <p>&copy; 2024 Sua Empresa. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Adiciona lógica para exibir o campo de formação com base no tipo de cadastro
        $('input[name="tipoCadastro"]').change(function () {
            if ($(this).val() === 'estudante') {
                $('#formacaoCampo').removeClass('d-none');
            } else {
                $('#formacaoCampo').addClass('d-none');
            }
        });
    </script>
</body>

</html>
