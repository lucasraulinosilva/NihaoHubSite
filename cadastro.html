<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <ul class="navbar nav nav-underline justify-content-center p-3">
        <li class="nav-item">
            <a class="nav-link" href="#">Home</a>
        </li>
        <li class="nav-item">
            <a class="nav-link active" href="#">Cadastro</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">Login</a>
        </li>
    </ul>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 col-sm-10">
                <div class="card shadow-sm p-4">
                    <h2 class="text-center mb-4">Cadastro</h2>
                    <form>
                        <!-- Parte 1: Informações básicas -->
                        <h4 class="mb-3">Informações Básicas</h4>
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="Digite seu email" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmarEmail" class="form-label">Confirmar Email</label>
                            <input type="email" class="form-control" id="confirmarEmail" placeholder="Confirme seu email" required>
                        </div>
                        <div class="mb-3">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmarSenha" class="form-label">Confirmar Senha</label>
                            <input type="password" class="form-control" id="confirmarSenha" placeholder="Confirme sua senha" required>
                        </div>

                        <!-- Parte 2: Dados cadastrais -->
                        <h4 class="mb-3 mt-5">Dados Cadastrais</h4>
                        <div class="mb-3">
                            <label for="telefone" class="form-label">Telefone para Contato</label>
                            <input type="tel" class="form-control" id="telefone" placeholder="Digite seu telefone" required>
                        </div>
                        <div class="mb-3">
                            <label for="cidade" class="form-label">Cidade</label>
                            <input type="text" class="form-control" id="cidade" placeholder="Digite sua cidade" required>
                        </div>
                        <div class="mb-3">
                            <label for="estado" class="form-label">Estado</label>
                            <input type="text" class="form-control" id="estado" placeholder="Digite seu estado" required>
                        </div>
                        <div class="mb-3">
                            <label for="sexo" class="form-label">Sexo</label>
                            <select class="form-select" id="sexo" required>
                                <option value="">Selecione</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="areaAtuacao" class="form-label">Área de Atuação</label>
                            <input type="text" class="form-control" id="areaAtuacao" placeholder="Digite sua área de atuação" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Você é?</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipoCadastro" id="professor" value="professor" required>
                                <label class="form-check-label" for="professor">Professor</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipoCadastro" id="estudante" value="estudante" required>
                                <label class="form-check-label" for="estudante">Estudante</label>
                            </div>
                        </div>

                        <div class="mb-3 d-none" id="formacaoCampo">
                            <label for="formacao" class="form-label">Formação</label>
                            <select class="form-select" id="formacao">
                                <option value="">Selecione seu curso de graduação</option>
                                <option value="CienciaComputacao">Ciência da Computação</option>
                                <option value="SistemasInformacao">Sistemas de Informação</option>
                                <option value="EngenhariaSoftware">Engenharia de Software</option>
                                <option value="Pedagogia">Pedagogia</option>
                                <option value="Matematica">Matemática</option>
                                <!-- Adicione mais cursos conforme necessário -->
                            </select>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">Cadastrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Exibe o campo de formação somente se o usuário for professor
        document.querySelectorAll('input[name="tipoCadastro"]').forEach(input => {
            input.addEventListener('change', function() {
                const formacaoCampo = document.getElementById('formacaoCampo');
                if (this.value === 'professor') {
                    formacaoCampo.classList.remove('d-none');
                } else {
                    formacaoCampo.classList.add('d-none');
                }
            });
        });
    </script>

</body>

</html>
