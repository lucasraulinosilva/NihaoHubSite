<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
        </script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <ul class="navbar nav nav-underline justify-content-center p-3">
        <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
            <a class="nav-link active" href="cadastro.html">Cadastro</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="login.html">Login</a>
        </li>
    </ul>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 col-sm-10">
                <div class="card shadow-sm p-4">
                    <h2 class="text-center mb-4">Cadastro</h2>
                    <form>
                        <!-- Parte 1: Informações básicas -->
                        <h4 class="mb-3">Informações Básicas</h4>
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="Digite seu email" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmarEmail" class="form-label">Confirmar Email</label>
                            <input type="email" class="form-control" id="confirmarEmail"
                                placeholder="Confirme seu email" required>
                        </div>
                        <div class="mb-3">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha" placeholder="Digite sua senha"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmarSenha" class="form-label">Confirmar Senha</label>
                            <input type="password" class="form-control" id="confirmarSenha"
                                placeholder="Confirme sua senha" required>
                        </div>

                        <!-- Parte 2: Dados cadastrais -->
                        <h4 class="mb-3 mt-5">Dados Cadastrais</h4>
                        <div class="mb-3">
                            <label for="telefone" class="form-label">Telefone para Contato</label>
                            <input type="tel" class="form-control" id="telefone" placeholder="Digite seu telefone"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="cidade" class="form-label">Cidade</label>
                            <input type="text" class="form-control" id="cidade" placeholder="Digite sua cidade"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="estado" class="form-label">Estado</label>
                            <select class="form-select" id="estado">
                                <option value="">Selecione</option>
                                <option value="AC">Acre</option>
                                <option value="AL">Alagoas</option>
                                <option value="AP">Amapá</option>
                                <option value="AM">Amazonas</option>
                                <option value="BA">Bahia</option>
                                <option value="CE">Ceará</option>
                                <option value="DF">Distrito Federal</option>
                                <option value="ES">Espírito Santo</option>
                                <option value="GO">Goiás</option>
                                <option value="MA">Maranhão</option>
                                <option value="MT">Mato Grosso</option>
                                <option value="MS">Mato Grosso do Sul</option>
                                <option value="MG">Minas Gerais</option>
                                <option value="PA">Pará</option>
                                <option value="PB">Paraíba</option>
                                <option value="PR">Paraná</option>
                                <option value="PE">Pernambuco</option>
                                <option value="PI">Piauí</option>
                                <option value="RJ">Rio de Janeiro</option>
                                <option value="RN">Rio Grande do Norte</option>
                                <option value="RS">Rio Grande do Sul</option>
                                <option value="RO">Rondônia</option>
                                <option value="RR">Roraima</option>
                                <option value="SC">Santa Catarina</option>
                                <option value="SP">São Paulo</option>
                                <option value="SE">Sergipe</option>
                                <option value="TO">Tocantins</option>

                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="sexo" class="form-label">Sexo</label>
                            <select class="form-select" id="sexo" required>
                                <option value="">Selecione</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                                <option value="PrefiroNaoDizer">Prefiro não dizer</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="escolaridade" class="form-label">Escolaridade</label>
                            <select class="form-select" id="escolaridade">
                                <option value="">Selecione</option>
                                <option value="">Ensino fundamental</option>
                                <option value="">Ensino fundamental incompleto</option>
                                <option value="">Ensino médio completo</option>
                                <option value="">Ensino médio incompleto</option>
                                <option value="">Ensino superior completo</option>
                                <option value="">Ensino incompleto</option>
                                <option value="">Mestrado</option>
                                <option value="">Doutorado</option>
                            </select>

                        </div>
                        <div class="mb-3">
                            <label for="areaAtuacao" class="form-label">Área de Atuação</label>
                            <input type="text" class="form-control" id="areaAtuacao"
                                placeholder="Digite sua área de atuação" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Você é?</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipoCadastro" id="professor"
                                    value="professor" required>
                                <label class="form-check-label" for="professor">Professor</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipoCadastro" id="estudante"
                                    value="estudante" required>
                                <label class="form-check-label" for="estudante">Estudante</label>
                            </div>
                        </div>

                        <div class="mb-3 d-none" id="formacaoCampo">
                            <label for="formacao" class="form-label">Formação</label>
                            <select class="form-select" id="formacao">
                                <option value="">Selecione</option>
                                <option value="Administração">Administração</option>
                                <option value="Agronomia">Agronomia</option>
                                <option value="Análise e Desenvolvimento de Sistemas">Análise e Desenvolvimento de Sistemas</option>
                                <option value="Antropologia">Antropologia</option>
                                <option value="Arquitetura e Urbanismo">Arquitetura e Urbanismo</option>
                                <option value="Artes Visuais">Artes Visuais</option>
                                <option value="Biomedicina">Biomedicina</option>
                                <option value="Biotecnologia">Biotecnologia</option>
                                <option value="Cinema e Audiovisual">Cinema e Audiovisual</option>
                                <option value="Ciência da Computação">Ciência da Computação</option>
                                <option value="Ciências Ambientais">Ciências Ambientais</option>
                                <option value="Ciências Biológicas">Ciências Biológicas</option>
                                <option value="Ciências Contábeis">Ciências Contábeis</option>
                                <option value="Ciências Sociais">Ciências Sociais</option>
                                <option value="Comércio Exterior">Comércio Exterior</option>
                                <option value="Design de Interiores">Design de Interiores</option>
                                <option value="Design Gráfico">Design Gráfico</option>
                                <option value="Direito">Direito</option>
                                <option value="Economia">Economia</option>
                                <option value="Educação Física">Educação Física</option>
                                <option value="Enfermagem">Enfermagem</option>
                                <option value="Engenharia Agrícola">Engenharia Agrícola</option>
                                <option value="Engenharia Ambiental">Engenharia Ambiental</option>
                                <option value="Engenharia Civil">Engenharia Civil</option>
                                <option value="Engenharia de Produção">Engenharia de Produção</option>
                                <option value="Engenharia de Software">Engenharia de Software</option>
                                <option value="Engenharia Elétrica">Engenharia Elétrica</option>
                                <option value="Engenharia Florestal">Engenharia Florestal</option>
                                <option value="Engenharia Mecânica">Engenharia Mecânica</option>
                                <option value="Estatística">Estatística</option>
                                <option value="Farmácia">Farmácia</option>
                                <option value="Filosofia">Filosofia</option>
                                <option value="Fisioterapia">Fisioterapia</option>
                                <option value="Física">Física</option>
                                <option value="Fotografia">Fotografia</option>
                                <option value="Geografia">Geografia</option>
                                <option value="Gestão de Recursos Humanos">Gestão de Recursos Humanos</option>
                                <option value="Gestão Financeira">Gestão Financeira</option>
                                <option value="Gestão Pública">Gestão Pública</option>
                                <option value="História">História</option>
                                <option value="Jornalismo">Jornalismo</option>
                                <option value="Logística">Logística</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Matemática">Matemática</option>
                                <option value="Medicina">Medicina</option>
                                <option value="Medicina Veterinária">Medicina Veterinária</option>
                                <option value="Moda">Moda</option>
                                <option value="Música">Música</option>
                                <option value="Nutrição">Nutrição</option>
                                <option value="Odontologia">Odontologia</option>
                                <option value="Pedagogia">Pedagogia</option>
                                <option value="Psicologia">Psicologia</option>
                                <option value="Publicidade e Propaganda">Publicidade e Propaganda</option>
                                <option value="Química">Química</option>
                                <option value="Relações Públicas">Relações Públicas</option>
                                <option value="Serviço Social">Serviço Social</option>
                                <option value="Sistemas de Informação">Sistemas de Informação</option>
                                <option value="Sociologia">Sociologia</option>
                                <option value="Teologia">Teologia</option>
                                <option value="Terapia Ocupacional">Terapia Ocupacional</option>
                                <option value="Zootecnia">Zootecnia</option>

    
                            </select>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="concordar" required>
                            <label class="form-check-label" for="concordar">Eu concordo com as <a href="politicas.html" target="_blank">políticas de privacidade</a> do site.</label>
                            <input type="checkbox" class="form-check-input" id="concordar" required>
                            <label class="form-check-label" for="concordar">Eu li e aceito os <a href="termosdeuso.html" target="_blank">termos de uso</a> do site.</label>
                            

                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">Cadastrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Exibe o campo de formação somente se o usuário for professor
        document.querySelectorAll('input[name="tipoCadastro"]').forEach(input => {
            input.addEventListener('change', function () {
                const formacaoCampo = document.getElementById('formacaoCampo');
                if (this.value === 'professor') {
                    formacaoCampo.classList.remove('d-none');
                } else {
                    formacaoCampo.classList.add('d-none');
                }
            });
        });
    </script>

</body>

</html>
